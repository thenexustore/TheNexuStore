name: CI

on:
  pull_request:
  push:
    branches: ["**"]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend/Store
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Backend/Store/package-lock.json
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run lint -- --max-warnings=0
      - run: npx tsc --noEmit

  admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/admin/package-lock.json
      - run: npm ci
      - run: npx eslint . --max-warnings=0
      - run: npx tsc --noEmit

  storefront:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/Store
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/Store/package-lock.json
      - run: npm ci
      - run: npm run lint -- --max-warnings=0
      - run: npx tsc --noEmit
