name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-required:
    name: Backend required checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend/Store
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Backend/Store/package-lock.json

      - name: Verify lockfile exists
        run: test -f package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify lockfile in sync
        run: |
          npm install --package-lock-only --ignore-scripts
          git diff --exit-code -- package-lock.json

      - name: Build backend
        run: npm run build

      - name: Bootstrap DI regression test
        run: npm test -- app.bootstrap.spec.ts --runInBand

  admin-required:
    name: Frontend admin required checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/admin/package-lock.json

      - name: Verify lockfile exists
        run: test -f package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify lockfile in sync
        run: |
          npm install --package-lock-only --ignore-scripts
          git diff --exit-code -- package-lock.json

      - name: Build admin
        run: npm run build

      - name: Verify admin Next build artifacts
        run: npm run check:next-build-artifacts

  storefront-required:
    name: Frontend store required checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/Store
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/Store/package-lock.json

      - name: Verify lockfile exists
        run: test -f package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify lockfile in sync
        run: |
          npm install --package-lock-only --ignore-scripts
          git diff --exit-code -- package-lock.json

      - name: Guard runtime entrypoint exclusivity
        run: npm run check:runtime-entrypoint

      - name: Typecheck storefront
        run: npx tsc --noEmit

      - name: Build storefront
        run: npm run build

      - name: Verify storefront Next build artifacts
        run: npm run check:next-build-artifacts
