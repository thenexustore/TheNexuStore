name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend/Store
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Backend/Store/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Config smoke matrix
        run: npm run config:smoke

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint (advisory while baseline is being fixed)
        id: lint
        continue-on-error: true
        run: npm run lint -- --max-warnings=0

      - name: Lint summary
        if: steps.lint.outcome == 'failure'
        run: |
          echo "⚠️ Backend lint has existing baseline issues. This step is advisory until baseline cleanup is completed." >> $GITHUB_STEP_SUMMARY

  admin:
    name: admin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (advisory while baseline is being fixed)
        id: lint
        continue-on-error: true
        run: npm run lint -- --max-warnings=0

      - name: Lint summary
        if: steps.lint.outcome == 'failure'
        run: |
          echo "⚠️ Admin lint has existing baseline issues. This step is advisory until baseline cleanup is completed." >> $GITHUB_STEP_SUMMARY

  storefront:
    name: storefront
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/Store
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/Store/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint (advisory while baseline is being fixed)
        id: lint
        continue-on-error: true
        run: npm run lint -- --max-warnings=0

      - name: Lint summary
        if: steps.lint.outcome == 'failure'
        run: |
          echo "⚠️ Storefront lint has existing baseline issues. This step is advisory until baseline cleanup is completed." >> $GITHUB_STEP_SUMMARY
